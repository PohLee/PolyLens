name: Validate Markdown Contracts

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-markdown-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate PolyLens markdown contracts
        run: python3 tools/validate_markdown_contracts.py